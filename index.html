<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pencatatan Keuangan Offline</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://unpkg.com/dexie/dist/dexie.js"></script>
</head>
<body class="bg-gray-100 p-4 sm:p-6">
    <div class="max-w-2xl mx-auto bg-white p-5 sm:p-6 rounded-lg shadow-md">
        <h1 class="text-2xl font-bold mb-6 text-center text-blue-600">Buku Kas Offline (PWA)</h1>
        
        <form id="finance-form" class="space-y-4 mb-6">
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Jenis Kas</label>
                    <select id="jenis" class="w-full p-2.5 border rounded-lg bg-gray-50 focus:ring-2 focus:ring-blue-500 font-medium text-gray-800">
                        <option value="masuk">[+] Uang Masuk</option>
                        <option value="keluar">[-] Uang Keluar</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Nominal (Rp)</label>
                    <input type="number" id="nominal" required class="w-full p-2.5 border rounded-lg bg-gray-50 focus:ring-2 focus:ring-blue-500" placeholder="Contoh: 50000">
                </div>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Keterangan / Keperluan</label>
                <input type="text" id="keterangan" required class="w-full p-2.5 border rounded-lg bg-gray-50 focus:ring-2 focus:ring-blue-500" placeholder="Sebutkan alasan transaksi...">
            </div>
            <button type="submit" class="w-full bg-blue-600 text-white p-2.5 rounded-lg font-semibold hover:bg-blue-700 transition shadow-sm flex items-center justify-center gap-2 cursor-pointer">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M12.75 15l3-3m0 0l-3-3m3 3h-7.5M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                </svg>
                Simpan Transaksi Offline
            </button>
        </form>

        <div class="mb-4 p-4 bg-gray-50 rounded-lg text-center font-bold text-lg border border-gray-200">
            Total Saldo Saat Ini: <span id="total-saldo" class="text-green-600">Rp 0</span>
        </div>

        <div class="flex gap-4 mb-6">
            <button id="export-btn" class="flex-1 bg-green-600 text-white p-2.5 rounded-lg hover:bg-green-700 font-medium text-sm transition flex items-center justify-center gap-2 cursor-pointer">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-4 h-4">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 0 0 5.25 21h13.5A2.25 2.25 0 0 0 21 18.75V16.5M16.5 12 12 16.5m0 0L7.5 12m4.5 4.5V3" />
                </svg>
                Ekspor Data (CSV)
            </button>
            <label class="flex-1 bg-amber-500 text-white p-2.5 rounded-lg hover:bg-amber-600 font-medium text-sm text-center cursor-pointer transition flex items-center justify-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-4 h-4">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 0 0 5.25 21h13.5A2.25 2.25 0 0 0 21 18.75V16.5m-13.5-9L12 3m0 0 4.5 4.5M12 3v13.5" />
                </svg>
                Impor Data Backup
                <input type="file" id="import-input" accept=".csv" class="hidden">
            </label>
        </div>

        <h2 class="text-xl font-bold mb-4 text-gray-800 flex items-center gap-2 border-t pt-4 border-gray-200">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5 text-gray-600">
                <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 3v16.5M21 19.5H3.75M6.75 12v3m3.75-6v6m3.75-9v9M18 6.75v12.75" />
            </svg>
            Laporan & Riwayat Transaksi
        </h2>
        
        <div id="monthly-container" class="space-y-6">
            </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
